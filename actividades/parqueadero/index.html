<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Parqueadero</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1> Sistema de Parqueadero</h1>

    <label>Tipo de Vehículo</label>
    <select id="tipo">
        <option value="Automóvil">Automóvil</option>
        <option value="Moto">Moto</option>
    </select>

    <label>Placa</label>
    <input type="text" id="placa" placeholder="ABC123">

    <label>Fecha y Hora de Ingreso</label>
    <input type="datetime-local" id="ingreso">

    <label>Fecha y Hora de Salida</label>
    <input type="datetime-local" id="salida">

    <label>Dinero Entregado</label>
    <input type="number" id="pagoCliente">

    <button onclick="calcularPago()">
        Calcular Pago
    </button>

    <div id="resultado"></div>

</div>

<script src="codigo.js"></script>

</body>
</html>
