<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafeteria</title>
  <link rel="stylesheet" href="cafeteria.css">
</head>
<body>
  <h1>CAFETERÍA</h1>

  <section class="productos">
    <article class="producto" data-nombre="Café" data-precio="13000">
      <img src="./1111.jpg" alt="Café">
      <h3>postre basico</h3>
      <p>$ 5000</p>
      <button class="yioo">Comprar</button>
    </article>
    <article class="producto" data-nombre="Pancakes" data-precio="10000">
      <img src="./2222.jpg" alt="Pizza">
      <h3>pancakes</h3>
      <p>$ 9000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="pancakes mas ricos" data-precio="12000">
      <img src="./3333.jpg" alt="Agua">
      <h3>tortas</h3>
      <p>$ 2000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="Comidita" data-precio="7800">
      <img src="./4444.jpg" alt="Chocolate">
      <h3>snacks</h3>
      <p>$ 5000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita mas rica" data-precio="4000">
      <img src="./5555.jpg" alt="Croissant">
      <h3>mini tortas</h3>
      <p>$ 4000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita aun mas rica" data-precio="3500">
      <img src="./6666.jpg" alt="Chela">
      <h3>mini pancakes</h3>
      <p>$ 3500</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita aun mas rica" data-precio="35000">
      <img src="7777.jpg" alt="Chela">
      <h3>toeta de chocolate</h3>
      <p>$ 35000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita aun mas rica" data-precio="2500">
      <img src="8888.jpg" alt="Chela">
      <h3>agua</h3>
      <p>$ 2500</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita aun mas rica" data-precio="2000">
      <img src="9999.jpg" alt="Chela">
      <h3>cruisant</h3>
      <p>$ 2000</p>
      <button>Comprar</button>
    </article>
    <article class="producto" data-nombre="comidita aun mas rica" data-precio="1500">
      <img src="11110.jpg" alt="Chela">
      <h3>cafe</h3>
      <p>$ 1500</p>
      <button>Comprar</button>
    </article>
  </section>

  <section class="carrito">
    <h2>Carrito de compras</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Cantidad</th>
          <th>Acción</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5">Carrito vacío - comience a comprar!</td>
        </tr>
      </tbody>
    </table>
    <h3 id="totalGeneral">Total: $0</h3>
  </section>
  <script src="./codigo.js"></script>
</body>
</html>
